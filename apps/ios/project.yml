name: KENUXA OPS
options:
  bundleIdPrefix: ai.KENUXA OPS
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  KENUXA OPSKit:
    path: ../shared/KENUXA OPSKit
  Swabble:
    path: ../swabble
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    exactVersion: 147.0.0

schemes:
  KENUXA OPS:
    shared: true
    build:
      targets:
        KENUXA OPS: all
    test:
      targets:
        - KENUXA OPSTests
        - KENUXA OPSLogicTests
  KENUXA OPSLogicTests:
    shared: true
    build:
      targets:
        KENUXA OPSLogicTests: all
    test:
      targets:
        - KENUXA OPSLogicTests

targets:
  KENUXA OPS:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: KENUXA OPSShareExtension
        embed: true
      - target: KENUXA OPSActivityWidget
        embed: true
      - target: KENUXA OPSWatchApp
      - package: KENUXA OPSKit
      - package: KENUXA OPSKit
        product: KENUXA OPSChatUI
      - package: KENUXA OPSKit
        product: KENUXA OPSProtocol
      - package: Swabble
        product: SwabbleKit
      - package: WebRTC
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../config/swiftformat" \
            --unexclude "$SRCROOT/Sources,$SRCROOT/ShareExtension,$SRCROOT/ActivityWidget,$SRCROOT/WatchExtension,$SRCROOT/../shared/KENUXA OPSKit,$SRCROOT/../swabble" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/KENUXA OPS.entitlements
        CODE_SIGN_STYLE: "$(KENUXA OPS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(KENUXA OPS_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(KENUXA OPS_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          KENUXA OPS_PUSH_TRANSPORT: direct
          KENUXA OPS_PUSH_DISTRIBUTION: local
          KENUXA OPS_PUSH_RELAY_BASE_URL: ""
          KENUXA OPS_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          KENUXA OPS_PUSH_TRANSPORT: direct
          KENUXA OPS_PUSH_DISTRIBUTION: local
          KENUXA OPS_PUSH_RELAY_BASE_URL: ""
          KENUXA OPS_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: KENUXA OPS
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.KENUXA OPS.ios
            CFBundleURLSchemes:
              - KENUXA OPS
        CFBundleShortVersionString: "$(KENUXA OPS_MARKETING_VERSION)"
        KENUXA OPSCanonicalVersion: "$(KENUXA OPS_IOS_VERSION)"
        CFBundleVersion: "$(KENUXA OPS_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.KENUXA OPS.ios.bgrefresh
        NSLocalNetworkUsageDescription: KENUXA OPS discovers and connects to your KENUXA OPS gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _KENUXA OPS-gw._tcp
        NSCameraUsageDescription: KENUXA OPS can capture photos or short video clips when requested via the gateway.
        NSCalendarsUsageDescription: KENUXA OPS uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsFullAccessUsageDescription: KENUXA OPS uses your calendars to show events and scheduling context when you enable calendar access.
        NSCalendarsWriteOnlyAccessUsageDescription: KENUXA OPS uses your calendars to add events when you enable calendar access.
        NSContactsUsageDescription: KENUXA OPS uses your contacts so you can search and reference people while using the assistant.
        NSLocationWhenInUseUsageDescription: KENUXA OPS uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: KENUXA OPS can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: KENUXA OPS needs microphone access for voice wake.
        NSMotionUsageDescription: KENUXA OPS may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: KENUXA OPS needs photo library access when you choose existing photos to share with your assistant.
        NSRemindersFullAccessUsageDescription: KENUXA OPS uses your reminders to list, add, and complete tasks when you enable reminders access.
        NSSpeechRecognitionUsageDescription: KENUXA OPS uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        KENUXA OPSPushTransport: "$(KENUXA OPS_PUSH_TRANSPORT)"
        KENUXA OPSPushDistribution: "$(KENUXA OPS_PUSH_DISTRIBUTION)"
        KENUXA OPSPushRelayBaseURL: "$(KENUXA OPS_PUSH_RELAY_BASE_URL)"
        KENUXA OPSPushAPNsEnvironment: "$(KENUXA OPS_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  KENUXA OPSShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: KENUXA OPSKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KENUXA OPS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(KENUXA OPS_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(KENUXA OPS_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: KENUXA OPS Share
        CFBundleShortVersionString: "$(KENUXA OPS_MARKETING_VERSION)"
        CFBundleVersion: "$(KENUXA OPS_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  KENUXA OPSActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/KENUXA OPSActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KENUXA OPS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(KENUXA OPS_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: KENUXA OPS Activity
        CFBundleShortVersionString: "$(KENUXA OPS_MARKETING_VERSION)"
        CFBundleVersion: "$(KENUXA OPS_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  KENUXA OPSWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: KENUXA OPSWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(KENUXA OPS_CODE_SIGN_STYLE)"
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KENUXA OPS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(KENUXA OPS_WATCH_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(KENUXA OPS_WATCH_APP_PROFILE)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: KENUXA OPS
        CFBundleShortVersionString: "$(KENUXA OPS_MARKETING_VERSION)"
        CFBundleVersion: "$(KENUXA OPS_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(KENUXA OPS_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  KENUXA OPSWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    attributes:
      DevelopmentTeam: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
      ProvisioningStyle: "$(KENUXA OPS_CODE_SIGN_STYLE)"
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KENUXA OPS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(KENUXA OPS_WATCH_EXTENSION_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(KENUXA OPS_WATCH_EXTENSION_PROFILE)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: KENUXA OPS
        CFBundleShortVersionString: "$(KENUXA OPS_MARKETING_VERSION)"
        CFBundleVersion: "$(KENUXA OPS_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(KENUXA OPS_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  KENUXA OPSTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: KENUXA OPS
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KENUXA OPS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.KENUXA OPS.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KENUXA OPS.app/KENUXA OPS"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: KENUXA OPSTests
        CFBundleShortVersionString: "$(KENUXA OPS_MARKETING_VERSION)"
        CFBundleVersion: "$(KENUXA OPS_BUILD_VERSION)"

  KENUXA OPSLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: KENUXA OPSKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(KENUXA OPS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(KENUXA OPS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.KENUXA OPS.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_EMIT_CONST_VALUE_PROTOCOLS: ""
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: KENUXA OPSLogicTests
        CFBundleShortVersionString: "$(KENUXA OPS_MARKETING_VERSION)"
        CFBundleVersion: "$(KENUXA OPS_BUILD_VERSION)"
