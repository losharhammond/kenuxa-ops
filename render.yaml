services:
  - type: web
    name: KENUXA OPS
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: KENUXA OPS_GATEWAY_PORT
        value: "8080"
      - key: KENUXA OPS_STATE_DIR
        value: /data/.KENUXA OPS
      - key: KENUXA OPS_WORKSPACE_DIR
        value: /data/workspace
      - key: KENUXA OPS_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: KENUXA OPS-data
      mountPath: /data
      sizeGB: 1
