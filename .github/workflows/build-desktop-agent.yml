name: Build Desktop Agent Installers

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    name: Build — ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os:       windows-latest
            platform: win
          - os:       macos-latest
            platform: mac
          - os:       ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Compile TypeScript
        working-directory: apps/desktop
        run: npm run build

      # ── Linux: install required native deps for electron-builder ─────────────
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y rpm fakeroot

      # ── Build Windows (.exe) ──────────────────────────────────────────────────
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        working-directory: apps/desktop
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Build macOS (.dmg) ────────────────────────────────────────────────────
      - name: Build macOS
        if: matrix.os == 'macos-latest'
        working-directory: apps/desktop
        run: npm run dist:mac
        env:
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # ── Build Linux (.AppImage) ───────────────────────────────────────────────
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        working-directory: apps/desktop
        run: npm run dist:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload build artifacts ────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            apps/desktop/release/**/*.exe
            apps/desktop/release/**/*.dmg
            apps/desktop/release/**/*.AppImage
          if-no-files-found: warn
          retention-days: 30

  # ── Publish GitHub Release once all 3 builds succeed ─────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: List downloaded files
        run: find installers -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KENUXA Desktop Agent ${{ github.ref_name }}"
          body: |
            ## KENUXA Desktop Agent ${{ github.ref_name }}

            Download the installer for your platform:

            | Platform | File |
            |----------|------|
            | Windows 10/11 | `KENUXA-Desktop-Agent-Setup-*.exe` |
            | macOS 13+     | `KENUXA-Desktop-Agent-*.dmg` |
            | Linux (x64)   | `KENUXA-Desktop-Agent-*.AppImage` |

            ### How to install
            1. Download the installer for your OS
            2. Run it and follow the prompts
            3. Sign in with your KENUXA CORE credentials
            4. The agent auto-pairs with OPS instantly — no QR code needed
          files: |
            installers/**/*.exe
            installers/**/*.dmg
            installers/**/*.AppImage
          draft:      false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
